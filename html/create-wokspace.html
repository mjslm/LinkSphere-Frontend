<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Workspace</title>
  <link rel="stylesheet" href="../css/create-workspace.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <button class="back-btn" type="button" aria-label="Go back">←</button>
      <h1>LINKSPHERE</h1>
    </header>

    <main class="content">
      <section class="intro">
        <h2>CREATE YOUR SPACE</h2>
        <div class="underline"></div>
      </section>

      <div class="icon-box" id="iconBox" role="button" tabindex="0" aria-label="Add workspace icon">
        <div class="camera">📷</div>
        <p>ADD ICON</p>
      </div>

      <form class="form">
        <label for="workspace">WORKSPACE NAME</label>
        <input type="text" id="workspace" value="HIGH CORTISOL" />

        <div class="info-box">
          Your workspace is where your team communicates. You can always change these later.
        </div>

        <button type="submit" class="create-btn">
          CREATE WORKSPACE <span>›</span>
        </button>
      </form>
    </main>
  </div>

  <script src="create-workspace.js"></script>
</body>
</html>
