<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <link rel="stylesheet" href="../css/messages.css" />
</head>
<body>

<div class="app">

  <!-- ── RAIL (workspace icons, leftmost strip) ── -->
  <aside class="server-bar">
    <div class="server-icon logo active" id="rail-home" title="Messages">✣</div>
    <!-- JS injects workspace icons here -->
    <button class="add-btn rail-add-ws" title="Create or Join Workspace">+</button>
  </aside>

  <!-- ── SIDEBAR (conversation list) ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Messages</span>
      <button class="sidebar-add-btn" id="new-dm-btn" title="New Message">+</button>
    </div>

    <div class="sidebar-search">
      <input type="text" id="sidebar-search-input" placeholder="Search conversations..." />
    </div>

    <div class="sidebar-conversations" id="conversation-list">
      <div class="spinner"></div>
    </div>

    <div class="sidebar-footer" style="cursor:pointer;" onclick="navigateTo('profile.html')">
      <div class="self-avatar" id="self-avatar-el">Y</div>
      <div class="self-info">
        <div class="self-name" id="self-name-el">YOU</div>
        <div class="self-status">Online</div>
      </div>
      <span style="font-size:28px; font-weight:900; color:#111; padding-right:4px;">›</span>
    </div>
  </aside>

  <!-- ── CHAT PANEL ── -->
  <main class="chat-panel" id="dm-panel">

    <!-- Empty / welcome state -->
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">✉</div>
      <div class="chat-empty-title">NO CHAT OPEN</div>
      <div class="chat-empty-sub">Select a conversation or tap + to start one</div>
    </div>

    <!-- Active chat -->
    <div class="chat-inner" id="chat-inner">

      <div class="chat-header">
        <button class="dm-back" id="dm-back" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="chat-header-avatar" id="dm-panel-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="dm-panel-name">—</div>
          <div class="chat-header-status">● Direct Message</div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" id="voice-call-btn" title="Start Voice Call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" width="16" height="16"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          </button>
          <button class="icon-btn" title="Search in chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="icon-btn" title="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" width="16" height="16"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </div>
      </div>

      <div class="dm-messages" id="dm-messages"></div>

      <div class="dm-input-bar">

        <!-- Attachment preview (shown when files are selected) -->
        <div id="dm-attachments-preview" class="attachments-preview" style="display:none;"></div>

        <div class="dm-input-row">
          <div class="dm-input-wrap">

            <!-- 📎 Upload button BEFORE the textarea -->
            <label class="upload-btn" for="dm-file-input" title="Attach file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="square" width="18" height="18">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19
                         a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </label>
            <input type="file" id="dm-file-input" multiple style="display:none;" />

            <textarea id="dm-input" rows="1" placeholder="Message..."></textarea>
          </div>
          <button class="dm-send-btn" id="dm-send-btn" title="Send">
            <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>

      </div>

    </div>
  </main>

</div>

<!-- ── New DM Modal ── -->
<div class="modal-overlay" id="new-dm-modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">NEW MESSAGE</div>
    <div class="modal-body">
      <label class="modal-label" for="user-search-input">SEARCH USER</label>
      <input class="modal-input" id="user-search-input" type="text" placeholder="Name or email..." autocomplete="off" />
      <div class="search-results" id="user-search-results"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="dm-modal-cancel">CANCEL</button>
    </div>
  </div>
</div>

<!-- ── Image Lightbox Modal ── -->
<div class="lightbox-overlay" id="lightbox-overlay" style="display:none;">
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightbox-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" width="24" height="24">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <img id="lightbox-image" src="" alt="" />
  </div>
</div>

<!-- ── Socket.io ── -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script src="../js/messages.js"></script>
</body>
</html>
