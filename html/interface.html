<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linksphere - Interface</title>
  <link rel="stylesheet" href="../css/interface.css" />
</head>
<body>

  <header class="topbar">
    <div class="left-header">
      <button class="menu-btn" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="brand">
        <div class="brand-icon">✣</div>
        <h1>LINKSPHERE</h1>
      </div>
    </div>

    <button class="profile-btn" id="profile-btn">
      <div id="profile-initial" style="
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 18px;
        letter-spacing: 1px;
      ">?</div>
    </button>
  </header>

  <main class="page">
    <section class="hero reveal">
      <span class="tag">NEW CONNECTION</span>

      <h2>
        WELCOME TO <br />
        <strong>LINKSPHERE.</strong><br />
        LET'S GET STARTED.
      </h2>

      <div class="underline"></div>
    </section>

    <section class="cards">
      <!-- Create Workspace -->
      <button class="action-card reveal" id="create-workspace-btn">
        <div class="card-icon">+</div>
        <h3>Create a<br />Workspace</h3>
        <p>Start fresh and invite your team to collaborate in a new workspace.</p>
        <span class="join-link">Create Now →</span>
      </button>

      <!-- Join Workspace -->
      <button class="action-card reveal" id="join-workspace-btn">
        <div class="card-icon">+</div>
        <h3>Join a<br />Workspace</h3>
        <p>Already have a team? Enter an invite code to jump right into the action.</p>
        <span class="join-link">Join Now →</span>
      </button>
    </section>

    <section class="features reveal">
      <div class="feature">
        <span>✦</span>
        <p>High Performance Hubs</p>
      </div>

      <div class="feature">
        <span>⬟</span>
        <p>Enterprise Security</p>
      </div>

      <div class="feature">
        <span>ϟ</span>
        <p>Real-Time Sync</p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="#">
      <span>⌂</span>
      Start
    </a>

    <a href="#">
      <span>◉</span>
      Search
    </a>

    <a href="#">
      <span>♢</span>
      Notification
    </a>

    <a href="workspace.html">
      <span>▦</span>
      Workspace
    </a>
  </nav>

  <script src="../js/interface.js"></script>
</body>
</html>
