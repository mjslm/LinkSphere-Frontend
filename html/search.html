<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linksphere Search</title>
  <link rel="stylesheet" href="../css/search.css" />
  <script defer src="../js/search.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand-wrap">
      <button class="menu-btn" aria-label="Open menu">☰</button>
      <div class="logo-mark">✣</div>
      <h1>LINKSPHERE</h1>
    </div>
    <button class="icon-btn" aria-label="Search">⌕</button>
  </header>

  <main class="page">
    <section class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="FIND ANYTHING" id="searchInput" />
      <button class="filter-btn" aria-label="Filter">☷</button>
    </section>

    <nav class="tabs">
      <button class="tab active">ALL</button>
      <button class="tab">MESSAGES</button>
      <button class="tab">PEOPLE</button>
    </nav>

    <section class="recent">
      <h2>RECENT</h2>
      <div class="recent-list">
        <div class="recent-item">Q3_LOGISTICS_PLAN <button aria-label="Remove recent search">×</button></div>
        <div class="recent-item">REDACTED_PROTOCOL <button aria-label="Remove recent search">×</button></div>
        <div class="recent-item">SARAH_JENKINS <button aria-label="Remove recent search">×</button></div>
      </div>
    </section>

    <section class="people">
      <h2>PEOPLE YOU MAY KNOW</h2>

      <div class="person-card">
        <img src="https://i.pravatar.cc/80?img=12" alt="Marcus Thorne" />
        <div>
          <h3>MARCUS_THORNE</h3>
          <p>IT Student</p>
        </div>
        <button class="msg-btn" aria-label="Message Marcus Thorne">✉</button>
      </div>

      <div class="person-card">
        <img src="https://i.pravatar.cc/80?img=47" alt="Elena Voss" />
        <div>
          <h3>ELENA_VOSS</h3>
          <p>IT Student</p>
        </div>
        <button class="msg-btn" aria-label="Message Elena Voss">✉</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="#"><span class="nav-icon">⌂</span><span>START</span></a>
    <a href="#" class="selected"><span class="nav-icon">◉</span><span>SEARCH</span></a>
    <a href="#"><span class="nav-icon">♙</span><span>NOTIFICATION</span></a>
    <a href="#"><span class="nav-icon">▦</span><span>WORKSPACE</span></a>
  </nav>
</body>
</html>
