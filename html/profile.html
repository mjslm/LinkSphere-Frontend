<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Settings</title>
  <link rel="stylesheet" href="../css/profile.css" />
</head>
<body>

  <header class="topbar">
    <button class="back-btn" aria-label="Go back">←</button>
    <h1>Profile Settings</h1>
  </header>

  <main class="page">
    <section class="profile-card reveal">
      <div class="avatar-box" style="position: relative; width: 120px; height: 120px; margin: 0 auto 16px;">
        
        <!-- Avatar Image -->
        <img id="profile-avatar" 
  src="https://ui-avatars.com/api/?name=User&background=000&color=fff&size=400&rounded=false" 
  alt="Profile Image" 
  style="
    width: 140px;
    height: 140px;
    border-radius: 0%;
    object-fit: cover;
    display: block;
  "
/>

        <!-- Upload Overlay -->
        <div id="avatar-overlay" style="
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
  border-radius: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  gap: 2px;
">
  <span style="font-size: 16px;">📷</span>
  <span>Edit</span>
</div>

        <!-- Hidden File Input -->
        <input type="file" id="avatar-input" accept="image/*" style="display: none;" />
      </div>

      <!-- Upload Status -->
      <p id="avatar-status" style="
        font-size: 11px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
        min-height: 16px;
        color: #059669;
      "></p>

      <h2 id="profile-name">Loading...</h2>
      <p id="profile-email">Loading...</p>
      <button class="red-btn" id="edit-profile-btn">Edit Profile</button>
    </section>

    <!-- Edit Profile Modal -->
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;">
      <div style="background:#fff; border:2px solid #000; padding:30px; width:90%; max-width:400px;">
        <h2 style="font-size:20px; font-weight:900; margin-bottom:20px; text-transform:uppercase;">Edit Profile</h2>
        <label style="font-size:12px; font-weight:900; display:block; margin-bottom:6px;">Full Name</label>
        <input id="edit-name" type="text" style="width:100%; border:2px solid #000; padding:10px; font-size:14px; font-weight:700; margin-bottom:16px; outline:none;" />
        <label style="font-size:12px; font-weight:900; display:block; margin-bottom:6px;">Email</label>
        <input id="edit-email" type="email" style="width:100%; border:2px solid #000; padding:10px; font-size:14px; font-weight:700; margin-bottom:20px; outline:none;" />
        <div id="edit-error" style="display:none; color:#d30000; font-size:12px; margin-bottom:12px; font-weight:700;"></div>
        <div style="display:flex; gap:10px;">
          <button id="edit-save-btn" style="flex:1; height:44px; background:#d30000; color:#fff; border:2px solid #000; font-weight:900; cursor:pointer; text-transform:uppercase;">Save</button>
          <button id="edit-cancel-btn" style="flex:1; height:44px; background:#fff; border:2px solid #000; font-weight:900; cursor:pointer; text-transform:uppercase;">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;">
      <div style="background:#fff; border:2px solid #000; padding:30px; width:90%; max-width:400px;">
        <h2 style="font-size:20px; font-weight:900; margin-bottom:20px; text-transform:uppercase;">Change Password</h2>
        <label style="font-size:12px; font-weight:900; display:block; margin-bottom:6px;">Current Password</label>
        <input id="current-password" type="password" style="width:100%; border:2px solid #000; padding:10px; font-size:14px; font-weight:700; margin-bottom:16px; outline:none;" placeholder="Current password" />
        <label style="font-size:12px; font-weight:900; display:block; margin-bottom:6px;">New Password</label>
        <input id="new-password" type="password" style="width:100%; border:2px solid #000; padding:10px; font-size:14px; font-weight:700; margin-bottom:16px; outline:none;" placeholder="Min 6 characters" />
        <label style="font-size:12px; font-weight:900; display:block; margin-bottom:6px;">Confirm Password</label>
        <input id="confirm-password" type="password" style="width:100%; border:2px solid #000; padding:10px; font-size:14px; font-weight:700; margin-bottom:20px; outline:none;" placeholder="Repeat new password" />
        <div id="password-error" style="display:none; color:#d30000; font-size:12px; margin-bottom:12px; font-weight:700;"></div>
        <div style="display:flex; gap:10px;">
          <button id="password-save-btn" style="flex:1; height:44px; background:#d30000; color:#fff; border:2px solid #000; font-weight:900; cursor:pointer; text-transform:uppercase;">Save</button>
          <button id="password-cancel-btn" style="flex:1; height:44px; background:#fff; border:2px solid #000; font-weight:900; cursor:pointer; text-transform:uppercase;">Cancel</button>
        </div>
      </div>
    </div>

    <section class="settings-card reveal">
      <div class="section-title">Account Security</div>
      <button class="setting-row" id="change-password-btn">
        <span>Change Password</span>
        <span class="arrow">›</span>
      </button>
      <div class="setting-row">
        <span>Two-Factor Authentication</span>
        <label class="switch">
          <input type="checkbox" checked />
          <span></span>
        </label>
      </div>
      <button class="setting-row">
        <span>Login Activity</span>
        <span class="history-icon">↺</span>
      </button>
    </section>

    <section class="settings-card reveal">
      <div class="section-title">App Preferences</div>
      <div class="setting-row">
        <span>Theme</span>
        <div class="theme-toggle">
          <button class="active" data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </div>
      <div class="setting-row">
        <span>Notification Sounds</span>
        <label class="switch sound-switch">
          <input type="checkbox" />
          <span></span>
        </label>
      </div>
      <div class="setting-row">
        <span>Language</span>
        <strong>English (US)</strong>
      </div>
    </section>

    <section class="danger-zone reveal">
      <button class="logout-btn">
        <span class="logout-icon">⇥</span>
        Logout
      </button>
      <button class="delete-btn">Delete Account</button>
    </section>
  </main>

  <script src="../js/profile.js"></script>
</body>
</html>
