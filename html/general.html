<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>General Chat</title>
  <link rel="stylesheet" href="../css/general.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="server-logo">G</div>
      <nav>
        <button class="channel active"># general</button>
        <button class="channel"># announcements</button>
        <button class="channel"># projects</button>
      </nav>
    </aside>

    <main class="chat">
      <header class="topbar">
        <div class="left">
          <button class="icon-btn menu" aria-label="Open menu">☰</button>
          <h1># GENERAL</h1>
        </div>
        <button class="icon-btn search" aria-label="Search">⌕</button>
      </header>

      <section class="messages">
        <div class="message mark">
          <div class="avatar red">M</div>
          <div class="content">
            <div class="meta"><span>MARK</span><small>10:42 AM</small></div>
            <p>Sulod namo do naa na si sir</p>
          </div>
        </div>

        <div class="message">
          <div class="avatar">M</div>
          <div class="content">
            <div class="meta"><span>MRCHL</span><small>10:45 AM</small></div>
            <p>Naa pako rob</p>
          </div>
        </div>

        <div class="message">
          <div class="avatar">S</div>
          <div class="content">
            <div class="meta"><span>SALMAN</span><small>11:10 AM</small></div>
            <img class="chat-img" src="GENERAL.png" alt="Chat attachment" />
          </div>
        </div>

        <div class="message">
          <div class="avatar">F</div>
          <div class="content">
            <div class="meta"><span>FHITZ</span><small>11:55 AM</small></div>
            <p>Kapoy akong lawas absent sako</p>
          </div>
        </div>
      </section>

      <footer class="inputbar">
        <div class="input-wrap">
          <button class="plus" aria-label="Add attachment">+</button>
          <input type="text" placeholder="MESSAGE #GENERAL" />
          <button class="send-btn" aria-label="Send message">SEND</button>
          <div class="icons">
            <span>▣</span>
            <span>▤</span>
            <span>☺</span>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script src="../js/general.js"></script>
</body>
</html>
