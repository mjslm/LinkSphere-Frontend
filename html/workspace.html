<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace</title>
  <link rel="stylesheet" href="../css/workspace.css" />
</head>
<body>

<div class="app">

  <!-- ── RAIL (workspace icons, leftmost strip) ── -->
  <aside class="server-bar">
    <div class="server-icon logo" title="Home">✣</div>
    <!-- JS injects workspace icons here -->
    <button class="add-btn" title="Create or Join Workspace">+</button>
  </aside>

  <!-- ── SIDEBAR (channels list) ── -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <span class="sidebar-ws-name" id="sidebar-ws-name">WORKSPACE</span>
      <button class="sidebar-add-btn" title="Add Channel">+</button>
    </div>

    <div class="channel-content" id="channel-content">
      <!-- JS fills channels here -->
    </div>

    <footer class="profile">
      <div class="profile-left">
        <div class="profile-img"></div>
        <div class="profile-text">
          <strong id="profile-ws-name">WORKSPACE</strong>
          <p id="profile-ws-slug">#workspace</p>
        </div>
      </div>
      <button class="settings" title="Workspace Settings">⚙</button>
    </footer>
  </aside>

  <!-- ── CHAT PANEL ── -->
  <section class="chat-panel" id="chat-panel">

    <!-- Empty state (no channel selected) -->
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-title">NO CHANNEL OPEN</div>
      <div class="chat-empty-sub">Select a channel from the sidebar to start chatting</div>
    </div>

    <!-- Active chat (shown when a channel is open) -->
    <div class="chat-inner" id="chat-inner">

      <header class="chat-header">
        <button class="back-to-channels" title="Back to channels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="chat-channel-name"># general</span>
        <div class="chat-header-actions">
          <button class="icon-btn" title="Search messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="icon-btn" title="Members">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" width="16" height="16"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
        </div>
      </header>

      <div class="chat-messages" id="chat-messages">
        <p class="no-messages">No messages yet. Say hello! 👋</p>
      </div>

      <footer class="chat-input-bar">

  <!-- Attachment preview (shown when files are selected) -->
  <div id="attachments-preview" class="attachments-preview" style="display:none;"></div>

  <div class="chat-input-row">
    <div class="chat-input-wrap">

      <!-- 📎 Upload button BEFORE the text input -->
      <label class="upload-btn" for="file-input" title="Attach file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="square" width="18" height="18">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19
                   a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </label>
      <input type="file" id="file-input" multiple style="display:none;" />

      <input type="text" id="chat-input" placeholder="Message #general" />
    </div>

    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>

</footer>

    </div>
  </section>

</div>

<script src="../js/workspace.js"></script>
</body>
</html>
