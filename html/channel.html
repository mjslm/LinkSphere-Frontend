<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Chika - Voice Channel</title>
  <link rel="stylesheet" href="../css/channel.css" />
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    /* ── Avatar inside participant tiles ─────────────────────────────── */
    .local-avatar-wrap img,
    .remote-avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* When camera is ON, hide the avatar layer */
    .tile-has-camera .local-avatar-wrap,
    .tile-has-camera .remote-avatar-wrap {
      display: none !important;
    }

    /* Voice meter active state for remote tiles */
    .voice-meter.listening {
      opacity: 1;
    }

    /* ── Connecting / empty state ────────────────────────────────────── */
    .participants-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 180px;
      color: #999;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .participants-empty .spinner-ring {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="call-app">

    <header class="top-bar">
      <div class="brand-wrap">
        <div class="wave-logo" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <i></i>
        </div>
        <h1>Private Chika</h1>
      </div>

      <div class="call-status">
        <strong id="callChannelName">LOBBY</strong>
        <span id="timer">00:00:00</span>
      </div>
    </header>

    <section class="call-area">

      <div class="recording-toast" role="status">
        <span class="record-icon">✱</span>
        <span>Voice Channel Active</span>
      </div>

      <section class="privacy-panel" id="privacyPanel" aria-live="polite">
        <div>
          <strong>Connection Status</strong>
          <span id="privacyText">Connecting to voice channel…</span>
        </div>
        <button id="privacyBtn" type="button">Reconnect</button>
      </section>

      <!-- Participants grid — JS injects tiles here -->
      <section class="participants" id="participantsGrid" aria-label="Voice channel participants">
        <!-- Loading placeholder shown until first tile is injected -->
        <div class="participants-empty" id="participantsEmpty">
          <div class="spinner-ring"></div>
          <span>Joining channel…</span>
        </div>
      </section>

    </section>

    <nav class="bottom-bar" aria-label="Call controls">
      <button class="control-btn" id="muteBtn" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/>
        </svg>
        <span>Mic</span>
      </button>

      <button class="control-btn" id="videoBtn" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M4 6h11a2 2 0 0 1 2 2v1.25L22 6.5v11l-5-2.75V16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"/>
        </svg>
        <span>Video</span>
      </button>

      <button class="control-btn leave" id="leaveBtn" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M4 13.5c0-3.04 3.58-5.5 8-5.5s8 2.46 8 5.5v1.4l-4 1.1-1.5-3.2c-.76-.2-1.6-.3-2.5-.3s-1.74.1-2.5.3L8 16l-4-1.1v-1.4Z"/>
        </svg>
        <span>Leave</span>
      </button>

      <button class="control-btn" id="moreBtn" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M5 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/>
        </svg>
        <span>More</span>
      </button>
    </nav>

  </main>

  <div class="mini-toast" id="miniToast">Action updated</div>

  <script src="../js/channel.js"></script>
</body>
</html>
