<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Chika - General Call</title>
  <link rel="stylesheet" href="../css/channel.css" />
</head>
<body>
  <main class="call-app">
    <header class="top-bar">
      <div class="brand-wrap">
        <div class="wave-logo" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <i></i>
        </div>
        <h1>Private Chika</h1>
      </div>

      <div class="call-status">
        <strong>#GENERAL CALL</strong>
        <span id="timer">04:22:15</span>
      </div>
    </header>

    <section class="call-area">
      <div class="recording-toast" role="status">
        <span class="record-icon">✱</span>
        <span>Recording Active</span>
      </div>

      <section class="privacy-panel" id="privacyPanel" aria-live="polite">
        <div>
          <strong>Privacy controls</strong>
          <span id="privacyText">Mic and camera are private until you allow browser access.</span>
        </div>
        <button id="privacyBtn" type="button">Allow mic + camera</button>
      </section>

      <section class="participants" aria-label="Call participants">
        <article class="participant active" style="--delay: .08s">
          <div class="tile-content red-tile" id="markTile">
            <video id="localVideo" autoplay muted playsinline></video>
            <button class="mic-badge" id="micBadge" aria-label="Microphone privacy status">
              <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
            </button>
            <span class="initial" id="markInitial">M</span>
            <span class="name-tag">Mark</span>
            <div class="voice-meter" id="voiceMeter" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
        </article>

        <article class="participant" style="--delay: .18s">
          <div class="tile-content">
            <button class="camera-off" aria-label="Camera off">
              <svg viewBox="0 0 24 24"><path d="m2.8 1.4 19.8 19.8-1.4 1.4-3.08-3.08H5a2 2 0 0 1-2-2V6.88L1.4 2.8l1.4-1.4ZM21 6.5v9.38l-3-3V9.5l3-3ZM5 4h10a2 2 0 0 1 2 2v5.76L9.24 4H5Z"/></svg>
            </button>
            <span class="initial">F</span>
            <span class="name-tag">Fhitz</span>
          </div>
        </article>

        <article class="participant" style="--delay: .28s">
          <div class="tile-content">
            <span class="initial">S</span>
            <span class="name-tag">Salman</span>
          </div>
        </article>
      </section>
    </section>

    <nav class="bottom-bar" aria-label="Call controls">
      <button class="control-btn" id="muteBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
        <span>Mic</span>
      </button>
      <button class="control-btn" id="videoBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 6h11a2 2 0 0 1 2 2v1.25L22 6.5v11l-5-2.75V16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"/></svg>
        <span>Video</span>
      </button>
      <button class="control-btn leave" id="leaveBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 13.5c0-3.04 3.58-5.5 8-5.5s8 2.46 8 5.5v1.4l-4 1.1-1.5-3.2c-.76-.2-1.6-.3-2.5-.3s-1.74.1-2.5.3L8 16l-4-1.1v-1.4Z"/></svg>
        <span>Leave</span>
      </button>
      <button class="control-btn" id="moreBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M5 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
        <span>More</span>
      </button>
    </nav>
  </main>

  <div class="mini-toast" id="miniToast">Action updated</div>
  <script src="../js/channel.js"></script>
</body>
</html>
